name: bitoo
description: "Premium music player for local audio files."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Music engine
  audio_metadata_reader: ^1.6.0
  permission_handler: ^12.0.0

  # Utilities
  path_provider: ^2.1.5
  path: ^1.9.0
  collection: ^1.19.0
  rxdart: ^0.28.0
  crypto: ^3.0.6
  flutter_secure_storage: ^10.3.1
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.7.0

  # UI
  cached_network_image: ^3.4.1

  # Audio playback
  just_audio: ^0.9.43
  audio_service: ^0.18.16
  audio_session: ^0.1.21

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21