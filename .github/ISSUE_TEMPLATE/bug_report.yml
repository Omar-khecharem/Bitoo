name: Bug Report
description: File a bug report to help us improve BITOO
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: BITOO Version
      description: What version of BITOO are you running?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & OS
      description: What device and Android version?
      placeholder: "Pixel 8 Pro, Android 15"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace
      description: If applicable, paste any relevant logs or error messages.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched for existing issues before filing this report
          required: true
